version: '3.8'

services:
  weaviate:
    image: semitechnologies/weaviate:1.24.6
    container_name: ecolab-weaviate
    ports:
      - "8080:8080"
      - "50051:50051"
    restart: unless-stopped
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "true"
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: text2vec-transformers
      ENABLE_MODULES: text2vec-transformers
      TRANSFORMERS_INFERENCE_API: http://t2v-transformers:8080
      CLUSTER_HOSTNAME: node1
    volumes:
      - weaviate_data:/var/lib/weaviate
    depends_on:
      - t2v-transformers
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/v1/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

  t2v-transformers:
    image: semitechnologies/transformers-inference:sentence-transformers-multi-qa-MiniLM-L6-cos-v1
    container_name: ecolab-t2v
    restart: unless-stopped
    environment:
      ENABLE_CUDA: "0"   # set to 1 if you have a GPU
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:8080/.well-known/ready"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  weaviate_data:
    driver: local
