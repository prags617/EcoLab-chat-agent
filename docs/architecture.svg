<?xml version="1.0" encoding="UTF-8"?>
<svg viewBox="0 0 900 620" xmlns="http://www.w3.org/2000/svg" font-family="'Segoe UI', Arial, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrow-green" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#27ae60"/>
    </marker>
    <marker id="arrow-orange" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#e67e22"/>
    </marker>
  </defs>

  <!-- Background -->
  <rect width="900" height="620" fill="#f8fafc" rx="12"/>
  <rect x="10" y="10" width="880" height="600" fill="white" rx="10" stroke="#e2e8f0" stroke-width="1.5"/>

  <!-- Title -->
  <text x="450" y="45" text-anchor="middle" font-size="20" font-weight="700" fill="#1e293b">Ecolab AI Agent — System Architecture</text>
  <text x="450" y="65" text-anchor="middle" font-size="12" fill="#64748b">RAG + Tool Calling via MCP | CLI Interface using Claude deepagent</text>

  <!-- === USER LAYER === -->
  <rect x="350" y="90" width="200" height="70" rx="10" fill="#1e40af" stroke="#1d4ed8" stroke-width="2"/>
  <text x="450" y="120" text-anchor="middle" font-size="13" font-weight="600" fill="white">👤 User</text>
  <text x="450" y="140" text-anchor="middle" font-size="11" fill="#bfdbfe">CLI Terminal</text>
  <text x="450" y="156" text-anchor="middle" font-size="10" fill="#93c5fd">claude --mcp-config ...</text>

  <!-- Arrow: User → Claude deepagent -->
  <line x1="450" y1="160" x2="450" y2="200" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="185" font-size="10" fill="#4a90d9">natural language</text>

  <!-- === CLAUDE DEEPAGENT === -->
  <rect x="280" y="200" width="340" height="90" rx="10" fill="#7c3aed" stroke="#6d28d9" stroke-width="2"/>
  <text x="450" y="228" text-anchor="middle" font-size="13" font-weight="700" fill="white">🤖 Claude deepagent</text>
  <text x="450" y="248" text-anchor="middle" font-size="11" fill="#ddd6fe">claude --mcp-config claude_mcp_config.json</text>
  <text x="450" y="265" text-anchor="middle" font-size="10" fill="#c4b5fd">LLM Reasoning + Tool Selection + Response Synthesis</text>
  <text x="450" y="281" text-anchor="middle" font-size="10" fill="#a78bfa">--system-prompt system_prompt.md</text>

  <!-- Arrow down to MCP -->
  <line x1="450" y1="290" x2="450" y2="330" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow)"/>
  <text x="465" y="316" font-size="10" fill="#4a90d9">MCP protocol (stdio)</text>

  <!-- === MCP SERVER === -->
  <rect x="250" y="330" width="400" height="80" rx="10" fill="#065f46" stroke="#047857" stroke-width="2"/>
  <text x="450" y="358" text-anchor="middle" font-size="13" font-weight="700" fill="white">⚙️  MCP Tool Server</text>
  <text x="450" y="376" text-anchor="middle" font-size="11" fill="#a7f3d0">mcp-server/server.py  (Python, runs as subprocess)</text>
  <text x="450" y="393" text-anchor="middle" font-size="10" fill="#6ee7b7">search_environmental_docs | get_water_quality_data | get_epa_facility_info</text>

  <!-- Arrow: MCP → Weaviate -->
  <line x1="330" y1="410" x2="200" y2="460" stroke="#27ae60" stroke-width="2" marker-end="url(#arrow-green)"/>

  <!-- Arrow: MCP → USGS -->
  <line x1="450" y1="410" x2="450" y2="460" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- Arrow: MCP → EPA -->
  <line x1="570" y1="410" x2="710" y2="460" stroke="#e67e22" stroke-width="2" marker-end="url(#arrow-orange)"/>

  <!-- === WEAVIATE === -->
  <rect x="60" y="460" width="230" height="110" rx="10" fill="#0f172a" stroke="#1e293b" stroke-width="2"/>
  <text x="175" y="488" text-anchor="middle" font-size="13" font-weight="700" fill="#38bdf8">🗃  Weaviate</text>
  <text x="175" y="506" text-anchor="middle" font-size="10" fill="#94a3b8">Docker (localhost:8080)</text>
  <text x="175" y="522" text-anchor="middle" font-size="10" fill="#64748b">─────────────────────</text>
  <text x="175" y="538" text-anchor="middle" font-size="10" fill="#7dd3fc">Collection: EcolabDocs</text>
  <text x="175" y="553" text-anchor="middle" font-size="10" fill="#94a3b8">Vectorizer: sentence-transformers</text>
  <text x="175" y="568" text-anchor="middle" font-size="10" fill="#94a3b8">multi-qa-MiniLM-L6-cos-v1</text>

  <!-- Weaviate label: RAG -->
  <rect x="60" y="432" width="50" height="20" rx="4" fill="#27ae60"/>
  <text x="85" y="446" text-anchor="middle" font-size="10" font-weight="600" fill="white">RAG</text>

  <!-- === USGS API === -->
  <rect x="330" y="460" width="230" height="110" rx="10" fill="#0c4a6e" stroke="#0284c7" stroke-width="2"/>
  <text x="445" y="488" text-anchor="middle" font-size="13" font-weight="700" fill="#7dd3fc">💧  USGS Water Quality</text>
  <text x="445" y="506" text-anchor="middle" font-size="10" fill="#94a3b8">waterqualitydata.us (REST API)</text>
  <text x="445" y="522" text-anchor="middle" font-size="10" fill="#64748b">─────────────────────</text>
  <text x="445" y="538" text-anchor="middle" font-size="10" fill="#7dd3fc">pH, Dissolved O₂, Turbidity</text>
  <text x="445" y="553" text-anchor="middle" font-size="10" fill="#7dd3fc">Nitrate, Temperature, TDS</text>
  <text x="445" y="568" text-anchor="middle" font-size="10" fill="#94a3b8">Real-time NWIS monitoring data</text>

  <!-- USGS label: API -->
  <rect x="330" y="432" width="50" height="20" rx="4" fill="#e67e22"/>
  <text x="355" y="446" text-anchor="middle" font-size="10" font-weight="600" fill="white">API</text>

  <!-- === EPA API === -->
  <rect x="600" y="460" width="230" height="110" rx="10" fill="#1a1a2e" stroke="#7c3aed" stroke-width="2"/>
  <text x="715" y="488" text-anchor="middle" font-size="13" font-weight="700" fill="#c4b5fd">🏭  EPA ECHO</text>
  <text x="715" y="506" text-anchor="middle" font-size="10" fill="#94a3b8">echodata.epa.gov (REST API)</text>
  <text x="715" y="522" text-anchor="middle" font-size="10" fill="#64748b">─────────────────────</text>
  <text x="715" y="538" text-anchor="middle" font-size="10" fill="#c4b5fd">NPDES / RCRA / SDWIS</text>
  <text x="715" y="553" text-anchor="middle" font-size="10" fill="#c4b5fd">Facility Registry</text>
  <text x="715" y="568" text-anchor="middle" font-size="10" fill="#94a3b8">Industrial dischargers &amp; permits</text>

  <!-- EPA label: API -->
  <rect x="600" y="432" width="50" height="20" rx="4" fill="#e67e22"/>
  <text x="625" y="446" text-anchor="middle" font-size="10" font-weight="600" fill="white">API</text>

  <!-- Legend -->
  <rect x="30" y="590" width="12" height="12" fill="#27ae60" rx="2"/>
  <text x="48" y="601" font-size="10" fill="#475569">RAG (vector search)</text>
  <rect x="160" y="590" width="12" height="12" fill="#e67e22" rx="2"/>
  <text x="178" y="601" font-size="10" fill="#475569">External API call</text>
  <rect x="290" y="590" width="12" height="12" fill="#4a90d9" rx="2"/>
  <text x="308" y="601" font-size="10" fill="#475569">LLM / MCP protocol</text>
</svg>
